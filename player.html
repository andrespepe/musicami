<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SONIC — Reproductor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080c10;
    --surface:   #0e1419;
    --card:      #141b22;
    --border:    #1e2832;
    --accent:    #00e5ff;
    --accent2:   #7b61ff;
    --text:      #e8edf2;
    --muted:     #5a6878;
    --hover:     #1a2330;
    --active:    #162033;
    --playing:   rgba(0,229,255,.08);
    --radius:    10px;
    --mono:      'Space Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
  }

  /* ───── LAYOUT ───── */
  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 1fr 110px;
    height: 100vh;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ───── SIDEBAR ───── */
  .sidebar {
    grid-row: 1 / 2;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 22px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 14px;
  }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 10px 12px 0;
    flex-shrink: 0;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    transition: all .15s;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover { color: var(--text); background: var(--hover); }
  .nav-item.active { color: var(--accent); background: var(--playing); }

  .nav-item svg { flex-shrink: 0; width: 16px; height: 16px; }

  .playlists-section {
    flex: 1;
    overflow-y: auto;
    padding: 6px 12px 10px;
  }

  .playlists-section::-webkit-scrollbar { width: 3px; }
  .playlists-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 10px 6px;
  }

  .playlist-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    transition: all .15s;
    position: relative;
  }

  .playlist-item:hover { color: var(--text); background: var(--hover); }
  .playlist-item.active { color: var(--accent); background: var(--playing); }

  .playlist-item .pl-count {
    margin-left: auto;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
  }

  .playlist-item .pl-delete {
    display: none;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 2px;
    border-radius: 4px;
    margin-left: 4px;
  }

  .playlist-item:hover .pl-delete { display: flex; }
  .playlist-item .pl-delete:hover { color: #ff4d6d; }

  .btn-new-playlist {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    border: 1px dashed var(--border);
    background: transparent;
    width: 100%;
    margin-top: 6px;
    transition: all .15s;
  }

  .btn-new-playlist:hover { background: var(--playing); border-color: var(--accent); }

  /* ───── MAIN ───── */
  .main {
    grid-column: 2;
    grid-row: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main-header {
    padding: 20px 24px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .view-title {
    font-size: 22px;
    font-weight: 800;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .song-count {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    flex-shrink: 0;
  }

  .search-wrap {
    position: relative;
    width: 220px;
    flex-shrink: 0;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 8px 10px 8px 34px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  /* ───── VIRTUAL LIST ───── */
  .list-container {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .virtual-scroller {
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .virtual-scroller::-webkit-scrollbar { width: 4px; }
  .virtual-scroller::-webkit-scrollbar-track { background: transparent; }
  .virtual-scroller::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .virtual-spacer-top,
  .virtual-spacer-bottom {
    flex-shrink: 0;
  }

  .songs-list {
    display: flex;
    flex-direction: column;
  }

  .song-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    height: 52px;
    cursor: pointer;
    transition: background .12s;
    border-bottom: 1px solid transparent;
    position: relative;
    flex-shrink: 0;
  }

  .song-row:hover { background: var(--hover); }
  .song-row.playing { background: var(--playing); }
  .song-row.playing .song-name { color: var(--accent); }

  .song-row.selected { background: rgba(123,97,255,.07); }

  .song-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    width: 32px;
    text-align: right;
    flex-shrink: 0;
  }

  .song-row.playing .song-num { display: none; }

  .song-bars {
    display: none;
    align-items: center;
    gap: 2px;
    width: 32px;
    justify-content: flex-end;
    flex-shrink: 0;
  }

  .song-row.playing .song-bars { display: flex; }

  .bar {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: eq 0.8s ease-in-out infinite alternate;
  }
  .bar:nth-child(1) { height: 8px; animation-delay: 0s; }
  .bar:nth-child(2) { height: 14px; animation-delay: .15s; }
  .bar:nth-child(3) { height: 10px; animation-delay: .3s; }
  .bar:nth-child(4) { height: 16px; animation-delay: .1s; }

  .song-row.paused .bar { animation-play-state: paused; }

  @keyframes eq {
    from { transform: scaleY(0.4); }
    to   { transform: scaleY(1); }
  }

  .song-name {
    flex: 1;
    font-size: 13.5px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .song-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity .15s;
    flex-shrink: 0;
  }

  .song-row:hover .song-actions { opacity: 1; }

  .action-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    transition: color .15s, background .15s;
  }

  .action-btn:hover { color: var(--text); background: var(--border); }
  .action-btn.selected-mark { color: var(--accent2); }

  /* ───── PLAYER BAR ───── */
  .player-bar {
    grid-column: 1 / -1;
    grid-row: 2;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    backdrop-filter: blur(20px);
  }

  .now-playing {
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
    width: 220px;
    flex-shrink: 0;
  }

  .np-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .np-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--accent);
  }

  .np-name.idle { color: var(--muted); font-weight: 400; }

  /* Controls */
  .controls {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  .ctrl-buttons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 7px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }

  .ctrl-btn:hover { color: var(--text); background: var(--hover); }
  .ctrl-btn.active { color: var(--accent); }

  .ctrl-btn.play-btn {
    background: var(--accent);
    color: var(--bg);
    padding: 9px;
    width: 40px;
    height: 40px;
  }

  .ctrl-btn.play-btn:hover { background: #33eaff; transform: scale(1.05); }

  /* Progress */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 560px;
  }

  .time-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    width: 36px;
  }

  .time-label.right { text-align: right; }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    transition: height .15s;
  }

  .progress-bar:hover { height: 5px; }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 3px;
    pointer-events: none;
    transition: width .1s linear;
  }

  .progress-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 12px;
    height: 12px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    transition: transform .15s;
  }

  .progress-bar:hover .progress-thumb { transform: translate(-50%, -50%) scale(1); }

  /* Volume */
  .volume-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 140px;
    flex-shrink: 0;
  }

  .volume-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    display: flex;
    transition: color .15s;
    flex-shrink: 0;
  }

  .volume-btn:hover { color: var(--text); }

  .volume-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--text);
    border-radius: 50%;
    cursor: pointer;
    transition: background .15s;
  }

  .volume-slider:hover::-webkit-slider-thumb { background: var(--accent); }

  /* ───── MODAL ───── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 360px;
    max-width: 90vw;
  }

  .modal h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .modal input {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    outline: none;
    margin-bottom: 16px;
  }

  .modal input:focus { border-color: var(--accent); }

  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn {
    padding: 9px 18px;
    border-radius: 7px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .15s;
  }

  .btn-ghost { background: var(--border); color: var(--text); }
  .btn-ghost:hover { background: var(--hover); }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-primary:hover { background: #33eaff; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 130px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: all .25s;
    pointer-events: none;
    z-index: 200;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
    padding: 40px;
    text-align: center;
  }

  .empty-state svg { opacity: .3; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* Selection bar */
  .selection-bar {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    background: rgba(123,97,255,.12);
    border-top: 1px solid rgba(123,97,255,.2);
    flex-shrink: 0;
    font-size: 13px;
    color: var(--text);
  }

  .selection-bar.active { display: flex; }
  .selection-bar span { flex: 1; }

  /* ───── RESPONSIVE ───── */
  @media (max-width: 768px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 110px;
    }

    .sidebar {
      display: none;
      position: fixed;
      left: 0; top: 0; bottom: 110px;
      width: 280px;
      z-index: 50;
      border-right: 1px solid var(--border);
      box-shadow: 4px 0 30px rgba(0,0,0,.5);
    }

    .sidebar.open { display: flex; }

    .main { grid-column: 1; }

    .player-bar { padding: 0 14px; gap: 10px; }

    .now-playing { width: 140px; }

    .volume-wrap { display: none; }

    .search-wrap { width: 160px; }

    .view-title { font-size: 17px; }

    .mobile-menu-btn {
      display: flex !important;
    }
  }

  .mobile-menu-btn {
    display: none;
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    padding: 6px;
    border-radius: 7px;
  }

  .mobile-menu-btn:hover { background: var(--hover); }

  /* Loading spinner */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
    font-size: 14px;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar track global */
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="app" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">◈ SONIC</div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" id="nav-all" onclick="switchView('all')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Todas las canciones
      </button>
    </nav>
    <div class="playlists-section">
      <div class="section-label">Mis playlists</div>
      <div id="playlist-list"></div>
      <button class="btn-new-playlist" onclick="openNewPlaylistModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nueva playlist
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="main-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="view-title" id="view-title">Todas las canciones</div>
      <span class="song-count" id="song-count">—</span>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" type="search" placeholder="Buscar..." id="search-input" oninput="onSearch(this.value)">
      </div>
    </header>

    <!-- Selection bar -->
    <div class="selection-bar" id="selection-bar">
      <span id="selection-info">0 canciones seleccionadas</span>
      <button class="btn btn-ghost" onclick="clearSelection()">Limpiar</button>
      <button class="btn btn-primary" onclick="openAddToPlaylistModal()">+ Agregar a playlist</button>
    </div>

    <!-- List -->
    <div class="list-container" id="list-container">
      <div class="loading" id="loading-state">
        <div class="spinner"></div>
        Cargando canciones...
      </div>
      <div class="virtual-scroller" id="scroller" style="display:none">
        <div id="spacer-top" class="virtual-spacer-top"></div>
        <div class="songs-list" id="songs-list"></div>
        <div id="spacer-bottom" class="virtual-spacer-bottom"></div>
      </div>
      <div class="empty-state" id="empty-state" style="display:none">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <p>No se encontraron canciones<br>que coincidan con tu búsqueda.</p>
      </div>
    </div>
  </main>

  <!-- Player bar -->
  <footer class="player-bar">
    <div class="now-playing">
      <div class="np-label">Reproduciendo</div>
      <div class="np-name idle" id="np-name">Sin canción</div>
    </div>

    <div class="controls">
      <div class="ctrl-buttons">
        <button class="ctrl-btn" id="btn-shuffle" title="Aleatorio" onclick="toggleShuffle()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        </button>
        <button class="ctrl-btn" title="Anterior" onclick="prevSong()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="ctrl-btn play-btn" id="btn-play" title="Play/Pause" onclick="togglePlay()">
          <svg id="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button class="ctrl-btn" title="Siguiente" onclick="nextSong()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-repeat" title="Repetir" onclick="toggleRepeat()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>

      <div class="progress-row">
        <span class="time-label" id="time-current">0:00</span>
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          <div class="progress-thumb" id="progress-thumb" style="left:0%"></div>
        </div>
        <span class="time-label right" id="time-total">0:00</span>
      </div>
    </div>

    <div class="volume-wrap">
      <button class="volume-btn" onclick="toggleMute()" id="btn-mute">
        <svg id="icon-vol" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <svg id="icon-mute" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
      </button>
      <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.02" value="1" oninput="setVolume(this.value)">
    </div>
  </footer>
</div>

<!-- Modal nueva playlist -->
<div class="modal-overlay" id="modal-new">
  <div class="modal">
    <h3>Nueva playlist</h3>
    <input type="text" id="modal-pl-name" placeholder="Nombre de la playlist" maxlength="40"
      onkeydown="if(event.key==='Enter') confirmNewPlaylist()">
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-new')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmNewPlaylist()">Crear</button>
    </div>
  </div>
</div>

<!-- Modal agregar a playlist -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <h3>Agregar a playlist</h3>
    <div id="modal-pl-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px;max-height:250px;overflow-y:auto"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-add')">Cerrar</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIGURACIÓN
// ═══════════════════════════════════════════════════════

// ▶ Cambia esto por la URL real de tu JSON:
const JSON_URL = './songs.json';

// Si quieres probar sin JSON, define canciones aquí directamente:
const FALLBACK_SONGS = [
  { name: "Demo Track 1 — Configura tu JSON", url: "" },
  { name: "Demo Track 2 — Ver instrucciones en README", url: "" },
  { name: "Demo Track 3 — Sube tus MP3 al CDN", url: "" }
];

// ═══════════════════════════════════════════════════════
//  ESTADO GLOBAL
// ═══════════════════════════════════════════════════════
let allSongs        = [];   // todas las canciones cargadas
let filteredSongs   = [];   // canciones tras búsqueda
let currentQueue    = [];   // cola actual (índices de filteredSongs)
let shuffleQueue    = [];   // cola aleatoria
let currentIndex    = -1;   // índice en currentQueue
let isPlaying       = false;
let isShuffle       = false;
let isRepeat        = false;
let isMuted         = false;
let currentView     = 'all';  // 'all' | 'pl:{id}'
let searchQuery     = '';
let selected        = new Set(); // índices seleccionados (de allSongs)
let playlists       = {};        // { id: { name, songs:[...urls] } }
let nextPlId        = 1;

const audio = new Audio();
audio.preload = 'metadata';

// ═══════════════════════════════════════════════════════
//  VIRTUAL SCROLL
// ═══════════════════════════════════════════════════════
const ROW_H = 52;
let renderStart = 0;
let renderEnd   = 0;

function getScroller()   { return document.getElementById('scroller'); }
function getList()       { return document.getElementById('songs-list'); }
function getSpacerTop()  { return document.getElementById('spacer-top'); }
function getSpacerBot()  { return document.getElementById('spacer-bottom'); }

function virtualRender() {
  const scroller = getScroller();
  if (!scroller) return;
  const total   = filteredSongs.length;
  const scrollY = scroller.scrollTop;
  const viewH   = scroller.clientHeight;

  const buffer  = 8;
  const start   = Math.max(0, Math.floor(scrollY / ROW_H) - buffer);
  const end     = Math.min(total - 1, Math.ceil((scrollY + viewH) / ROW_H) + buffer);

  if (start === renderStart && end === renderEnd) return;
  renderStart = start;
  renderEnd   = end;

  getSpacerTop().style.height = (start * ROW_H) + 'px';
  getSpacerBot().style.height = ((total - 1 - end) * ROW_H) + 'px';

  const list = getList();
  list.innerHTML = '';
  const frag = document.createDocumentFragment();
  for (let i = start; i <= end; i++) {
    frag.appendChild(buildRow(filteredSongs[i], i));
  }
  list.appendChild(frag);
}

function buildRow(song, visIndex) {
  const globalIdx = allSongs.indexOf(song);
  const isNowPlaying = currentIndex >= 0 && filteredSongs[currentIndex] === song;
  const isSel = selected.has(globalIdx);

  const row = document.createElement('div');
  row.className = 'song-row' +
    (isNowPlaying ? (isPlaying ? ' playing' : ' playing paused') : '') +
    (isSel ? ' selected' : '');
  row.dataset.vindex = visIndex;
  row.style.height = ROW_H + 'px';

  row.innerHTML = `
    <div class="song-num">${visIndex + 1}</div>
    <div class="song-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
    <div class="song-name" title="${escHtml(song.name)}">${escHtml(song.name)}</div>
    <div class="song-actions">
      <button class="action-btn${isSel ? ' selected-mark' : ''}" title="${isSel ? 'Deseleccionar' : 'Seleccionar'}"
        onclick="toggleSelect(event,${globalIdx})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="${isSel ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>`;

  row.addEventListener('click', (e) => {
    if (e.target.closest('.action-btn')) return;
    playSongAt(visIndex);
  });

  return row;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════
//  CARGA DE DATOS
// ═══════════════════════════════════════════════════════
async function loadSongs() {
  try {
    const res = await fetch(JSON_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allSongs = data;
  } catch (e) {
    console.warn('No se pudo cargar el JSON, usando datos de demo.', e);
    allSongs = FALLBACK_SONGS;
  }
  initPlayer();
}

function initPlayer() {
  loadPlaylists();
  buildPlaylistSidebar();
  switchView('all');
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('scroller').style.display = 'block';
  setupScrollListener();
}

// ═══════════════════════════════════════════════════════
//  VISTAS
// ═══════════════════════════════════════════════════════
function switchView(viewId) {
  currentView = viewId;
  searchQuery = '';
  document.getElementById('search-input').value = '';
  clearSelection();

  // Highlight nav
  document.querySelectorAll('.nav-item, .playlist-item').forEach(el => el.classList.remove('active'));
  if (viewId === 'all') {
    document.getElementById('nav-all').classList.add('active');
    document.getElementById('view-title').textContent = 'Todas las canciones';
    filteredSongs = [...allSongs];
  } else {
    const plId = viewId.replace('pl:', '');
    const pl   = playlists[plId];
    if (!pl) return;
    document.getElementById('view-title').textContent = pl.name;
    filteredSongs = allSongs.filter(s => pl.songs.includes(s.url));
    document.getElementById('pl-nav-' + plId)?.classList.add('active');
  }

  buildQueue();
  updateSongCount();
  resetVirtualScroll();
}

function onSearch(q) {
  searchQuery = q.trim().toLowerCase();
  filteredSongs = getSongsForView().filter(s =>
    !searchQuery || s.name.toLowerCase().includes(searchQuery)
  );
  buildQueue();
  updateSongCount();
  resetVirtualScroll();
}

function getSongsForView() {
  if (currentView === 'all') return allSongs;
  const plId = currentView.replace('pl:', '');
  const pl   = playlists[plId];
  return pl ? allSongs.filter(s => pl.songs.includes(s.url)) : [];
}

function updateSongCount() {
  document.getElementById('song-count').textContent = filteredSongs.length + ' canciones';
  const empty = document.getElementById('empty-state');
  const scr   = document.getElementById('scroller');
  if (filteredSongs.length === 0) {
    empty.style.display = 'flex';
    scr.style.display   = 'none';
  } else {
    empty.style.display = 'none';
    scr.style.display   = 'block';
  }
}

// ═══════════════════════════════════════════════════════
//  COLA & REPRODUCCIÓN
// ═══════════════════════════════════════════════════════
function buildQueue() {
  currentQueue = filteredSongs.map((_, i) => i);
  if (isShuffle) buildShuffleQueue();
}

function buildShuffleQueue() {
  shuffleQueue = [...currentQueue].sort(() => Math.random() - 0.5);
}

function playSongAt(visIndex) {
  currentIndex = visIndex;
  const song   = filteredSongs[visIndex];
  if (!song || !song.url) {
    showToast('⚠ Esta canción no tiene URL asignada (modo demo)');
    return;
  }
  audio.src = song.url;
  audio.play().catch(e => showToast('Error al reproducir: ' + e.message));
  isPlaying = true;
  updatePlayUI();
  updateNowPlaying(song.name);
  refreshList();
  scrollToCurrentSong();
}

function togglePlay() {
  if (currentIndex < 0) {
    if (filteredSongs.length) playSongAt(0);
    return;
  }
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
  } else {
    audio.play();
    isPlaying = true;
  }
  updatePlayUI();
  refreshList();
}

function nextSong() {
  if (filteredSongs.length === 0) return;
  if (isShuffle) {
    const pos = shuffleQueue.indexOf(currentIndex);
    const nextPos = (pos + 1) % shuffleQueue.length;
    playSongAt(shuffleQueue[nextPos]);
  } else {
    playSongAt((currentIndex + 1) % filteredSongs.length);
  }
}

function prevSong() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  if (filteredSongs.length === 0) return;
  if (isShuffle) {
    const pos = shuffleQueue.indexOf(currentIndex);
    const prevPos = (pos - 1 + shuffleQueue.length) % shuffleQueue.length;
    playSongAt(shuffleQueue[prevPos]);
  } else {
    playSongAt((currentIndex - 1 + filteredSongs.length) % filteredSongs.length);
  }
}

function toggleShuffle() {
  isShuffle = !isShuffle;
  document.getElementById('btn-shuffle').classList.toggle('active', isShuffle);
  if (isShuffle) buildShuffleQueue();
}

function toggleRepeat() {
  isRepeat = !isRepeat;
  document.getElementById('btn-repeat').classList.toggle('active', isRepeat);
  audio.loop = isRepeat;
}

// ═══════════════════════════════════════════════════════
//  AUDIO EVENTS
// ═══════════════════════════════════════════════════════
audio.addEventListener('ended', () => {
  if (!isRepeat) nextSong();
});

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-thumb').style.left  = pct + '%';
  document.getElementById('time-current').textContent = formatTime(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  document.getElementById('time-total').textContent = formatTime(audio.duration);
});

// Progress click/drag
const progressBar = document.getElementById('progress-bar');
let dragging = false;

progressBar.addEventListener('mousedown', (e) => { dragging = true; seekTo(e); });
document.addEventListener('mousemove', (e) => { if (dragging) seekTo(e); });
document.addEventListener('mouseup',   ()  => { dragging = false; });

progressBar.addEventListener('touchstart', (e) => { dragging = true; seekTo(e.touches[0]); });
document.addEventListener('touchmove',     (e) => { if (dragging) seekTo(e.touches[0]); });
document.addEventListener('touchend',      ()  => { dragging = false; });

function seekTo(e) {
  const rect = progressBar.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  if (audio.duration) audio.currentTime = pct * audio.duration;
}

// ═══════════════════════════════════════════════════════
//  VOLUMEN
// ═══════════════════════════════════════════════════════
function setVolume(v) {
  audio.volume = v;
  isMuted = (v == 0);
  updateVolumeIcon();
}

function toggleMute() {
  isMuted = !isMuted;
  audio.muted = isMuted;
  updateVolumeIcon();
}

function updateVolumeIcon() {
  document.getElementById('icon-vol').style.display  = isMuted ? 'none' : '';
  document.getElementById('icon-mute').style.display = isMuted ? '' : 'none';
}

// ═══════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════
function updatePlayUI() {
  document.getElementById('icon-play').style.display  = isPlaying ? 'none' : '';
  document.getElementById('icon-pause').style.display = isPlaying ? '' : 'none';
}

function updateNowPlaying(name) {
  const el = document.getElementById('np-name');
  el.textContent = name;
  el.classList.remove('idle');
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function refreshList() {
  renderStart = -1; renderEnd = -1;
  virtualRender();
}

function resetVirtualScroll() {
  const scr = getScroller();
  if (scr) scr.scrollTop = 0;
  renderStart = -1; renderEnd = -1;
  getSpacerTop().style.height  = '0px';
  getSpacerBot().style.height  = '0px';
  getList().innerHTML = '';

  // Total height for the container
  const total = filteredSongs.length;
  // Set inner height so scroll works
  getSpacerBot().style.height = Math.max(0, (total - 0) * ROW_H) + 'px';
  getSpacerTop().style.height = '0px';

  virtualRender();
}

function scrollToCurrentSong() {
  if (currentIndex < 0) return;
  const scr = getScroller();
  const top = currentIndex * ROW_H;
  const viewH = scr.clientHeight;
  if (top < scr.scrollTop || top + ROW_H > scr.scrollTop + viewH) {
    scr.scrollTo({ top: top - viewH / 2 + ROW_H / 2, behavior: 'smooth' });
  }
}

function setupScrollListener() {
  const scr = getScroller();
  let rafId;
  scr.addEventListener('scroll', () => {
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(virtualRender);
  });
  window.addEventListener('resize', () => {
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(() => { renderStart=-1; renderEnd=-1; virtualRender(); });
  });
}

// ═══════════════════════════════════════════════════════
//  SELECCIÓN
// ═══════════════════════════════════════════════════════
function toggleSelect(e, globalIdx) {
  e.stopPropagation();
  if (selected.has(globalIdx)) selected.delete(globalIdx);
  else selected.add(globalIdx);
  updateSelectionBar();
  refreshList();
}

function updateSelectionBar() {
  const bar = document.getElementById('selection-bar');
  if (selected.size > 0) {
    bar.classList.add('active');
    document.getElementById('selection-info').textContent =
      selected.size + ' canción' + (selected.size > 1 ? 'es' : '') + ' seleccionada' + (selected.size > 1 ? 's' : '');
  } else {
    bar.classList.remove('active');
  }
}

function clearSelection() {
  selected.clear();
  updateSelectionBar();
  refreshList();
}

// ═══════════════════════════════════════════════════════
//  PLAYLISTS
// ═══════════════════════════════════════════════════════
function loadPlaylists() {
  try {
    const saved = localStorage.getItem('sonic_playlists');
    if (saved) {
      const parsed = JSON.parse(saved);
      playlists = parsed.playlists || {};
      nextPlId  = parsed.nextId || 1;
    }
  } catch(e) { playlists = {}; }
}

function savePlaylists() {
  localStorage.setItem('sonic_playlists', JSON.stringify({ playlists, nextId: nextPlId }));
}

function buildPlaylistSidebar() {
  const container = document.getElementById('playlist-list');
  container.innerHTML = '';
  Object.entries(playlists).forEach(([id, pl]) => {
    const item = document.createElement('div');
    item.className = 'playlist-item' + (currentView === 'pl:' + id ? ' active' : '');
    item.id = 'pl-nav-' + id;
    item.innerHTML = `
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(pl.name)}</span>
      <span class="pl-count">${pl.songs.length}</span>
      <button class="pl-delete" title="Eliminar" onclick="deletePlaylist(event,'${id}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>`;
    item.addEventListener('click', (e) => {
      if (e.target.closest('.pl-delete')) return;
      switchView('pl:' + id);
    });
    container.appendChild(item);
  });
}

function openNewPlaylistModal() {
  document.getElementById('modal-pl-name').value = '';
  document.getElementById('modal-new').classList.add('open');
  setTimeout(() => document.getElementById('modal-pl-name').focus(), 50);
}

function confirmNewPlaylist() {
  const name = document.getElementById('modal-pl-name').value.trim();
  if (!name) return;
  const id = String(nextPlId++);
  playlists[id] = { name, songs: [] };
  savePlaylists();
  buildPlaylistSidebar();
  closeModal('modal-new');
  showToast('✓ Playlist "' + name + '" creada');
}

function deletePlaylist(e, id) {
  e.stopPropagation();
  delete playlists[id];
  savePlaylists();
  if (currentView === 'pl:' + id) switchView('all');
  buildPlaylistSidebar();
  showToast('Playlist eliminada');
}

function openAddToPlaylistModal() {
  if (selected.size === 0) return;
  const container = document.getElementById('modal-pl-list');
  container.innerHTML = '';

  if (Object.keys(playlists).length === 0) {
    container.innerHTML = '<p style="color:var(--muted);font-size:13px">No tienes playlists aún. Crea una primero.</p>';
  } else {
    Object.entries(playlists).forEach(([id, pl]) => {
      const btn = document.createElement('button');
      btn.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;color:var(--text);font-family:var(--sans);font-size:13px;text-align:left;transition:background .15s;';
      btn.innerHTML = `<strong>${escHtml(pl.name)}</strong> <span style="color:var(--muted);font-size:12px">${pl.songs.length} canciones</span>`;
      btn.onmouseenter = () => btn.style.background = 'var(--hover)';
      btn.onmouseleave = () => btn.style.background = 'var(--surface)';
      btn.onclick = () => addSelectionToPlaylist(id);
      container.appendChild(btn);
    });
  }

  document.getElementById('modal-add').classList.add('open');
}

function addSelectionToPlaylist(plId) {
  const pl = playlists[plId];
  let added = 0;
  selected.forEach(globalIdx => {
    const url = allSongs[globalIdx]?.url;
    if (url && !pl.songs.includes(url)) {
      pl.songs.push(url);
      added++;
    }
  });
  savePlaylists();
  buildPlaylistSidebar();
  closeModal('modal-add');
  clearSelection();
  showToast(`✓ ${added} canción(es) agregadas a "${pl.name}"`);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════════════
//  MOBILE SIDEBAR
// ═══════════════════════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ═══════════════════════════════════════════════════════
//  TECLADO
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT') return;
  if (e.code === 'Space')       { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight')  { audio.currentTime = Math.min(audio.duration, audio.currentTime + 5); }
  if (e.code === 'ArrowLeft')   { audio.currentTime = Math.max(0, audio.currentTime - 5); }
  if (e.code === 'ArrowUp')     { e.preventDefault(); audio.volume = Math.min(1, audio.volume + 0.05); document.getElementById('volume-slider').value = audio.volume; }
  if (e.code === 'ArrowDown')   { e.preventDefault(); audio.volume = Math.max(0, audio.volume - 0.05); document.getElementById('volume-slider').value = audio.volume; }
  if (e.code === 'KeyN')        { nextSong(); }
  if (e.code === 'KeyP')        { prevSong(); }
  if (e.code === 'KeyS')        { toggleShuffle(); }
  if (e.code === 'KeyR')        { toggleRepeat(); }
});

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
loadSongs();
</script>
</body>
</html>
